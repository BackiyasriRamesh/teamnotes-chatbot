<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us - TeamNotes</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="contact-body">

<div class="navbar">
    <h1>TeamNotes</h1>

    <div>
        <a href="/">Home</a>
        <a href="/contact">Contact Us</a>
    </div>
</div>

<h2>Contact Us Form</h2>

<form id="contactForm">

    <label>First Name</label>
    <input type="text" id="fname" placeholder="Enter First Name">

    <label>Last Name</label>
    <input type="text" id="lname" placeholder="Enter Last Name">

    <label>Age</label>
    <input type="number" id="age" placeholder="Enter Age">

    <label>Gender</label><br>

    <input type="radio" name="gender" value="Male" style="width:auto;"> Male

    <input type="radio" name="gender" value="Female" style="width:auto;"> Female

    <input type="radio" name="gender" value="Other" style="width:auto;"> Other

    <br><br>

    <label>Mobile Number</label>
    <input type="text" id="mobile" placeholder="Enter Mobile Number">

    <label>Email Address</label>
    <input type="text" id="email" placeholder="Enter Email Address">

    <label>Address</label>
    <textarea id="address" placeholder="Enter Address"></textarea>

    <label>Description (Optional)</label>
    <textarea id="description"
              placeholder="Enter Description"></textarea>

    <button type="submit">Submit</button>

    <button type="button" onclick="resetForm()">
        Reset
    </button>

    <p id="message"></p>

</form>

<h2>Submitted Records</h2>

<table id="dataTable">

    <tr>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Age</th>
        <th>Gender</th>
        <th>Mobile</th>
        <th>Email</th>
        <th>Address</th>
        <th>Description</th>
        <th>Actions</th>
    </tr>

</table>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
