<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Notes | TeamNotes</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<!-- ================= NAVBAR ================= -->

<div class="navbar">

    <h1>📝 TeamNotes</h1>

    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/contact">Contact</a>
    </div>

</div>

<!-- ================= GUEST PANEL ================= -->

<div id="guest-panel" class="container">

    <h2>Welcome to TeamNotes</h2>

    <p>
        Register or Login to manage your personal notes.
    </p>

    <div class="auth-container">

        <!-- Login -->

        <div class="auth-card">

            <h3>Login</h3>

            <input
                type="email"
                id="login-email"
                placeholder="Enter Email">

            <button onclick="loginHome()">
                Login
            </button>

        </div>

        <!-- Register -->

        <div class="auth-card">

            <h3>Create Account</h3>

            <input
                type="text"
                id="reg-first"
                placeholder="First Name">

            <input
                type="text"
                id="reg-last"
                placeholder="Last Name">

            <input
                type="email"
                id="reg-email"
                placeholder="Email">

            <button onclick="registerHome()">
                Register
            </button>

        </div>

    </div>

</div>

<!-- ================= USER PANEL ================= -->

<div
    id="user-panel"
    class="container"
    style="display:none;">

    <div class="dashboard-header">

        <h2 id="welcome-user">
            Welcome
        </h2>

        <button
            class="logout-btn"
            onclick="logoutHome()">

            Logout

        </button>

    </div>

    <div class="add-section">

        <button
            class="add-btn"
            onclick="showAddNote()">

            + Add New Note

        </button>

    </div>

    <div
        id="add-note-box"
        style="display:none;">

        <textarea
            id="new-note"
            rows="5"
            placeholder="Write your note..."></textarea>

        <br>

        <button
            class="save-btn"
            onclick="saveNoteHome()">

            Save Note

        </button>

    </div>

    <h3 class="notes-title">
        My Notes
    </h3>

    <div id="user-notes">

    </div>

</div>

<!-- ================= SCRIPT ================= -->

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
